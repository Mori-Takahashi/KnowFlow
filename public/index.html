<!-- Theme vor dem ersten Paint setzen (verhindert Aufblitzen des falschen Themes).
     Muss vor den Stylesheets stehen. -->
<script>
(function () {
  try {
    var t = localStorage.getItem('knowflow-theme');
    if (t !== 'light' && t !== 'dark') {
      t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    var d = document.documentElement;
    d.dataset.theme = t;
    d.dataset.bsTheme = t;
  } catch (e) { /* Standard: hell */ }
})();
</script>
